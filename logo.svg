    <path d="M38 76 C 36 60, 48 47, 63 47 C 76 47, 85 54, 87 62"
          stroke="#658594" stroke-width="4" opacity="0.85"/>
  </g>
  <!-- foam -->
  <g fill="#dcd7ba">
    <circle cx="99" cy="56" r="3"/>
    <circle cx="92" cy="46" r="2.4"/>
    <circle cx="81" cy="39" r="2"/>
    <circle cx="70" cy="61" r="2"/>
