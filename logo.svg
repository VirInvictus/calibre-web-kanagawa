<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- calibre-web-kanagawa: a wave breaking over an open book, Dragon palette -->
  <rect x="0" y="0" width="128" height="128" rx="24" fill="#181616"/>
  <!-- open book -->
  <g stroke="#c8c093" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M22 96 C 38 88, 54 88, 64 94 C 74 88, 90 88, 106 96"/>
    <path d="M22 96 L22 102 C 38 94, 54 94, 64 100 C 74 94, 90 94, 106 102 L106 96"/>
    <path d="M64 94 L64 100"/>
  </g>
  <!-- the wave -->
  <g fill="none" stroke-linecap="round">
    <path d="M30 78 C 26 56, 42 38, 64 38 C 84 38, 96 50, 97 64 C 90 56, 78 54, 72 60 C 80 62, 86 70, 84 78"
